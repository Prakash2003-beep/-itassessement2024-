  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Photo Gallery</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      padding: 20px;
      color: #efebeb;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .gallery img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(249, 246, 246, 0.1);
      transition: transform 0.3s ease;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <h1>Our Adventures</h1>

  <div class="gallery">
    <img src="images/photo1.jpg" alt="Gallery Photo 1">
    <img src="images/photo2.jpg" alt="Gallery Photo 2">
    <img src="images/photo3.jpg" alt="Gallery Photo 3">
    <img src="images/photo4.jpg" alt="Gallery Photo 4">
    <img src="images/photo5.jpg" alt="Gallery Photo 5">
    <img src="images/photo6.jpg" alt="Gallery Photo 6">
    <img src="images/photo7.jpg" alt="Gallery Photo 7">
    <img src="images/photo8.jpg" alt="Gallery Photo 8">
  </div>

</body>
</html>
